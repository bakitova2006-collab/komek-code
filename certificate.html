<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Сертификат — KOMEK CODE</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .certificate {
      background: white;
      padding: 50px;
      border: 5px solid #4CAF50;
      text-align: center;
      width: 600px;
      border-radius: 10px;
    }

    .title {
      font-size: 32px;
      margin-bottom: 20px;
    }

    .name {
      font-size: 28px;
      margin: 20px 0;
      font-weight: bold;
    }

    .btn {
      margin-top: 30px;
      padding: 10px 20px;
      background: #4CAF50;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      display: inline-block;
    }
  </style>

</head>

<body>

<div class="certificate">

  <div class="title">🎓 Сертификат</div>

  <p>Настоящим подтверждается, что</p>

  <div class="name" id="studentName">Ученик</div>

  <p>успешно завершил курс</p>

  <h2>KOMEK CODE</h2>

  <p>Основы веб-программирования</p>

  <p id="date"></p>

  <a href="student-home.html" class="btn">На главную</a>

</div>

<script>
  // имя (если есть)
  let name = localStorage.getItem("studentName") || "Ученик";
  document.getElementById("studentName").innerText = name;

  // дата
  let today = new Date();
  document.getElementById("date").innerText =
    today.toLocaleDateString();
</script>

</body>
</html>
